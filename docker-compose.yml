services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "140302"
      POSTGRES_DB: payments
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  provider-simulator:
    image: ghcr.io/fintech-dev-lab/internship-provider-simulator:v0.2.0
    environment:
      CALLBACK_URL: http://paymentservice:8080/receipts
    ports:
      - "8081:8081"

  paymentservice:
    build:
      context: .
      dockerfile: PaymentService/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=payments;Username=postgres;Password=140302"
      ProviderSettings__BaseUrl: "http://provider-simulator:8081"
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      provider-simulator:
        condition: service_started

volumes:
  pgdata: